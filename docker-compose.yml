x-health-default: &health-default
  interval: 2s
  timeout: 2s
  retries: 15

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-field_test_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *health-default
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      start_period: 5s

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/field_test_db}
      SAMPLE_DATA_DIR: /sample-data
    volumes:
      - ./sample-data:/sample-data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      <<: *health-default
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    command: streamlit run dashboard.py --server.address=0.0.0.0
    working_dir: /app/src

volumes:
  postgres_data:
